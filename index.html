<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Pick'em Challenge</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f9f9f8;color:#1a1a1a;-webkit-text-size-adjust:100%}
    input,button{font-family:inherit;font-size:14px;outline:none}
    input{border:1px solid #ddd;border-radius:8px;padding:8px 12px;width:100%;background:#fff;color:#1a1a1a}
    input:focus{border-color:#888}
    button{border:1px solid #ddd;border-radius:8px;padding:7px 14px;background:#fff;color:#1a1a1a;cursor:pointer}
    button:hover{background:#f3f3f1}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
    .nav-bar{display:flex;gap:0;border-bottom:1px solid #e5e5e3;margin-bottom:20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .nav-bar::-webkit-scrollbar{display:none}
    .nav-btn{padding:10px 12px;border:none;border-bottom:2px solid transparent;border-radius:0;background:none;cursor:pointer;font-size:12px;white-space:nowrap;display:flex;align-items:center;gap:5px;margin-bottom:-1px;flex-shrink:0}
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
    @media(min-width:500px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
    .pick-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    @media(min-width:500px){.pick-type-grid{grid-template-columns:repeat(4,1fr)}}
    .lb-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:12px;border:1px solid #e5e5e3;margin-bottom:20px}
    .lb-table{min-width:420px;width:100%}
    .game-card{padding:12px 14px;border-radius:12px;border:1px solid #e5e5e3;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:8px;text-align:left;width:100%;cursor:pointer}
    .result-row{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
    .result-info{display:flex;align-items:center;gap:6px;min-width:0}
    .result-btns{display:flex;gap:4px;flex-shrink:0}
    .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:8px}
    .pick-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .pick-row-left{display:flex;align-items:center;gap:8px;min-width:0}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo}=React;

const SUPA_URL="https://udcqekvsdhpjwowgnkwz.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkY3Fla3ZzZGhwandvd2dua3d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1ODEwNjQsImV4cCI6MjA5NDE1NzA2NH0.956GDRY6W-1oZzQcggFFo0YpPd91lD0ueJxqBjmwZsE";
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);
const ODDS_PROXY="/api/odds";

const PICK_TYPES=[
  {key:"over",    label:"Over",    icon:"ti-arrow-up",  accent:"#059669",accentBg:"rgba(5,150,105,0.12)", desc:"Total goes over"},
  {key:"under",   label:"Under",   icon:"ti-arrow-down",accent:"#0284c7",accentBg:"rgba(2,132,199,0.12)", desc:"Total goes under"},
  {key:"favorite",label:"Favorite",icon:"ti-star",      accent:"#d97706",accentBg:"rgba(217,119,6,0.12)",  desc:"Covers spread"},
  {key:"underdog",label:"Underdog",icon:"ti-heart",     accent:"#dc2626",accentBg:"rgba(220,38,38,0.12)",  desc:"Beats spread"},
];
const pickScore=r=>r==="win"?1:r==="push"?0.5:0;

const NFL_TEAMS={
  "Arizona Cardinals":{abbr:"ARI"},"Atlanta Falcons":{abbr:"ATL"},"Baltimore Ravens":{abbr:"BAL"},
  "Buffalo Bills":{abbr:"BUF"},"Carolina Panthers":{abbr:"CAR"},"Chicago Bears":{abbr:"CHI"},
  "Cincinnati Bengals":{abbr:"CIN"},"Cleveland Browns":{abbr:"CLE"},"Dallas Cowboys":{abbr:"DAL"},
  "Denver Broncos":{abbr:"DEN"},"Detroit Lions":{abbr:"DET"},"Green Bay Packers":{abbr:"GB"},
  "Houston Texans":{abbr:"HOU"},"Indianapolis Colts":{abbr:"IND"},"Jacksonville Jaguars":{abbr:"JAX"},
  "Kansas City Chiefs":{abbr:"KC"},"Las Vegas Raiders":{abbr:"LV"},"Los Angeles Chargers":{abbr:"LAC"},
  "Los Angeles Rams":{abbr:"LAR"},"Miami Dolphins":{abbr:"MIA"},"Minnesota Vikings":{abbr:"MIN"},
  "New England Patriots":{abbr:"NE"},"New Orleans Saints":{abbr:"NO"},"New York Giants":{abbr:"NYG"},
  "New York Jets":{abbr:"NYJ"},"Philadelphia Eagles":{abbr:"PHI"},"Pittsburgh Steelers":{abbr:"PIT"},
  "San Francisco 49ers":{abbr:"SF"},"Seattle Seahawks":{abbr:"SEA"},"Tampa Bay Buccaneers":{abbr:"TB"},
  "Tennessee Titans":{abbr:"TEN"},"Washington Commanders":{abbr:"WAS"},
};
const teamAbbr=t=>NFL_TEAMS[t]?.abbr||t.split(" ").pop().slice(0,3).toUpperCase();

function parseGames(raw){
  return raw.map(g=>{
    const home=g.home_team,away=g.away_team;
    let spread=null,favorite=null,underdog=null,total=null;
    const book=g.bookmakers?.[0];
    if(book){
      const sm=book.markets?.find(m=>m.key==="spreads");
      const tm=book.markets?.find(m=>m.key==="totals");
      if(sm){const ho=sm.outcomes?.find(o=>o.name===home);const ao=sm.outcomes?.find(o=>o.name===away);if(ho&&ao){if(ho.point<0){favorite=home;underdog=away;spread=ho.point;}else{favorite=away;underdog=home;spread=ao.point;}}}
      if(tm){const ov=tm.outcomes?.find(o=>o.name==="Over");if(ov)total=ov.point;}
    }
    return{id:g.id,away,home,awayAbbr:teamAbbr(away),homeAbbr:teamAbbr(home),spread,favorite,underdog,total,commenceTime:g.commence_time};
  }).filter(g=>g.spread!==null&&g.total!==null);
}

function lineLabel(type,g){
  if(!g)return"";
  if(type==="over")return`O ${g.total}`;
  if(type==="under")return`U ${g.total}`;
  if(type==="favorite")return`${g.favorite?.split(" ").pop()} ${g.spread}`;
  return`${g.underdog?.split(" ").pop()} +${Math.abs(g.spread)}`;
}

function gameTime(t){
  if(!t)return"";
  return new Date(t).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}

function Avatar({name,size=36}){
  const p=["#4f46e5","#0891b2","#059669","#d97706","#dc2626","#7c3aed","#db2777","#0284c7"];
  return<div style={{width:size,height:size,borderRadius:"50%",background:p[name.charCodeAt(0)%p.length],display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:size*0.36,fontWeight:600,flexShrink:0}}>{name.slice(0,2).toUpperCase()}</div>;
}

function Spinner({label="Loading..."}){
  return<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 0",gap:12}}>
    <i className="ti ti-refresh" style={{fontSize:28,color:"#999",animation:"spin 1s linear infinite"}}/>
    <p style={{fontSize:14,color:"#666"}}>{label}</p>
  </div>;
}

function NavBar({page,setPage,isAdmin}){
  const tabs=[{id:"picks",label:"My Picks",icon:"ti-home"},{id:"leaderboard",label:"Standings",icon:"ti-trophy"},{id:"history",label:"History",icon:"ti-history"},{id:"alltime",label:"All-Time",icon:"ti-chart-bar"},...(isAdmin?[{id:"admin",label:"Results",icon:"ti-adjustments-horizontal"}]:[])];
  return<nav className="nav-bar">{tabs.map(t=><button key={t.id} className="nav-btn" onClick={()=>setPage(t.id)} style={{fontWeight:page===t.id?600:400,color:page===t.id?"#1a1a1a":"#666",borderBottomColor:page===t.id?"#1a1a1a":"transparent"}}><i className={`ti ${t.icon}`} style={{fontSize:13}}/>{t.label}</button>)}</nav>;
}

/* ─── AUTH ─── */
function AuthPage({onAuth}){
  const[mode,setMode]=useState("signin");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[username,setUsername]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);

  const submit=async()=>{
    setErr("");setLoading(true);
    try{
      if(mode==="signin"){
        const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
        if(error)throw error;
        const{data:profile}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
        onAuth(data.user,profile);
      } else {
        if(!username.trim())throw new Error("Username is required");
        const{data,error}=await sb.auth.signUp({email,password:pw});
        if(error)throw error;
        await sb.from("profiles").insert({id:data.user.id,username:username.trim(),is_admin:false});
        const{data:profile}=await sb.from("profiles").select("*").eq("id",data.user.id).single();
        onAuth(data.user,profile);
      }
    }catch(e){setErr(e.message);}
    finally{setLoading(false);}
  };

  return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{width:"100%",maxWidth:380}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:56,height:56,borderRadius:16,background:"#f3f3f1",border:"1px solid #e5e5e3",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px"}}>
          <i className="ti ti-ball-football" style={{fontSize:28}}/>
        </div>
        <h1 style={{fontSize:22,fontWeight:600,margin:"0 0 4px"}}>Pick'em Challenge</h1>
        <p style={{fontSize:14,color:"#666"}}>NFL Season 2025</p>
      </div>
      <div style={{background:"#fff",border:"1px solid #e5e5e3",borderRadius:16,padding:20}}>
        <div style={{display:"flex",background:"#f3f3f1",borderRadius:10,padding:3,marginBottom:18,gap:3}}>
          {[["signin","Sign in"],["signup","Sign up"]].map(([m,l])=><button key={m} onClick={()=>{setMode(m);setErr("");}} style={{flex:1,padding:"7px 0",border:"none",borderRadius:8,fontSize:13,fontWeight:500,background:mode===m?"#fff":"transparent",color:"#1a1a1a"}}>{l}</button>)}
        </div>
        {mode==="signup"&&<div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:4,letterSpacing:"0.04em"}}>USERNAME</label>
          <input placeholder="What your friends call you" value={username} onChange={e=>setUsername(e.target.value)}/>
        </div>}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:4,letterSpacing:"0.04em"}}>EMAIL</label>
          <input type="email" placeholder="you@email.com" value={email} onChange={e=>setEmail(e.target.value)}/>
        </div>
        <div style={{marginBottom:16}}>
          <label style={{fontSize:12,fontWeight:600,color:"#666",display:"block",marginBottom:4,letterSpacing:"0.04em"}}>PASSWORD</label>
          <input type="password" placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        </div>
        {err&&<div style={{fontSize:12,color:"#dc2626",marginBottom:12,padding:"8px 10px",background:"rgba(220,38,38,0.06)",borderRadius:8}}>{err}</div>}
        <button onClick={submit} disabled={loading} style={{width:"100%",padding:"11px 0",fontSize:14,fontWeight:600,borderRadius:10,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer"}}>
          {loading?"Please wait...":(mode==="signin"?"Sign in":"Create account")}
        </button>
      </div>
    </div>
  </div>;
}

/* ─── PICKS ─── */
function PicksPage({user,profile,games,error,fetchOdds,lastUpdated}){
  const[picks,setPicks]=useState({over:null,under:null,favorite:null,underdog:null});
  const[submitted,setSubmitted]=useState(false);
  const[saving,setSaving]=useState(false);
  const[activeType,setActiveType]=useState("over");
  const[weekNum,setWeekNum]=useState(1);
  const[existingPicks,setExistingPicks]=useState([]);
  const[loadingPicks,setLoadingPicks]=useState(true);

  useEffect(()=>{
    (async()=>{
      setLoadingPicks(true);
      const{data}=await sb.from("picks").select("*").eq("user_id",user.id).eq("week",weekNum);
      if(data&&data.length===4){
        setExistingPicks(data);setSubmitted(true);
      } else {setExistingPicks([]);setSubmitted(false);setPicks({over:null,under:null,favorite:null,underdog:null});}
      setLoadingPicks(false);
    })();
  },[weekNum,user.id]);

  const usedGames=Object.entries(picks).filter(([k,v])=>v&&k!==activeType).map(([,v])=>v.gameId);
  const allPicked=PICK_TYPES.every(pt=>picks[pt.key]);
  const activePt=PICK_TYPES.find(pt=>pt.key===activeType);

  const selectPick=(game)=>{
    if(submitted)return;
    setPicks(p=>({...p,[activeType]:p[activeType]?.gameId===game.id?null:{gameId:game.id,game}}));
    const next=PICK_TYPES.find(t=>t.key!==activeType&&!picks[t.key]);
    if(next)setActiveType(next.key);
  };

  const savePicks=async()=>{
    setSaving(true);
    const{data:season}=await sb.from("seasons").select("id").eq("year",2025).single();
    const rows=PICK_TYPES.map(pt=>({
      user_id:user.id,season_id:season.id,week:weekNum,pick_type:pt.key,
      game_id:picks[pt.key].game.id,away_team:picks[pt.key].game.away,home_team:picks[pt.key].game.home,
      line:pt.key==="over"||pt.key==="under"?picks[pt.key].game.total:picks[pt.key].game.spread,
      result:"pending"
    }));
    await sb.from("picks").upsert(rows,{onConflict:"user_id,week,pick_type"});
    setSubmitted(true);setSaving(false);
  };

  if(loadingPicks)return<Spinner label="Loading your picks..."/>;

  return<div style={{maxWidth:620,margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:8}}>
      <div style={{minWidth:0}}>
        <h2 style={{fontSize:17,fontWeight:600,margin:"0 0 2px"}}>Week {weekNum} picks</h2>
        <p style={{fontSize:12,color:"#666",margin:0}}>Locks Thursday · 4 different games</p>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
        <select value={weekNum} onChange={e=>setWeekNum(+e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:8,border:"1px solid #ddd"}}>
          {Array.from({length:18},(_,i)=><option key={i+1} value={i+1}>Wk {i+1}</option>)}
        </select>
        <button onClick={fetchOdds} style={{padding:"5px 10px",fontSize:12,display:"flex",alignItems:"center",gap:4}}>
          <i className="ti ti-refresh" style={{fontSize:12}}/>
        </button>
      </div>
    </div>

    {error&&<div style={{padding:"10px 12px",background:"rgba(220,38,38,0.08)",border:"1px solid rgba(220,38,38,0.2)",borderRadius:10,marginBottom:14,fontSize:13,color:"#dc2626"}}>{error}</div>}

    {submitted&&existingPicks.length>0&&<>
      <div style={{padding:"10px 14px",background:"rgba(5,150,105,0.08)",border:"1px solid rgba(5,150,105,0.2)",borderRadius:10,marginBottom:14,fontSize:13,color:"#059669",display:"flex",alignItems:"center",gap:6}}>
        <i className="ti ti-circle-check"/><span>Picks locked in for Week {weekNum}</span>
      </div>
      <div style={{display:"grid",gap:8,marginBottom:16}}>
        {existingPicks.map(p=>{
          const pt=PICK_TYPES.find(t=>t.key===p.pick_type);
          const rs={win:{bg:"rgba(5,150,105,0.1)",color:"#059669",label:"✓ Win"},push:{bg:"rgba(217,119,6,0.1)",color:"#d97706",label:"~ Push"},loss:{bg:"rgba(220,38,38,0.1)",color:"#dc2626",label:"✗ Loss"},pending:{bg:"#f3f3f1",color:"#999",label:"Pending"}};
          const r=rs[p.result]||rs.pending;
          return<div key={p.id} style={{padding:"12px 14px",borderRadius:12,border:"1px solid #e5e5e3",background:r.bg,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
              <div style={{width:30,height:30,borderRadius:8,background:pt.accentBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <i className={`ti ${pt.icon}`} style={{fontSize:14,color:pt.accent}}/>
              </div>
              <div style={{minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.away_team.split(" ").pop()} @ {p.home_team.split(" ").pop()}</div>
                <div style={{fontSize:11,color:"#666"}}>{pt.label} · {pt.key==="over"?`O ${p.line}`:pt.key==="under"?`U ${p.line}`:p.line}</div>
              </div>
            </div>
            <span style={{fontSize:11,fontWeight:600,color:r.color,flexShrink:0}}>{r.label}</span>
          </div>;
        })}
      </div>
      <button onClick={()=>setSubmitted(false)} style={{width:"100%",padding:"10px 0",fontSize:13,borderRadius:10}}>Edit picks</button>
    </>}

    {!submitted&&games.length===0&&!error&&<div style={{padding:"40px 0",textAlign:"center"}}>
      <i className="ti ti-calendar-off" style={{fontSize:36,display:"block",marginBottom:10,color:"#999"}}/>
      <p style={{fontSize:14,color:"#666"}}>No NFL games with lines right now.</p>
      <p style={{fontSize:13,color:"#999",margin:"4px 0 0"}}>Check back closer to the season.</p>
    </div>}

    {!submitted&&games.length>0&&<>
      <div className="pick-type-grid">
        {PICK_TYPES.map(pt=>{
          const hasPick=!!picks[pt.key];const isActive=activeType===pt.key;
          return<button key={pt.key} onClick={()=>setActiveType(pt.key)} style={{padding:"10px 6px",borderRadius:10,textAlign:"center",border:isActive?`2px solid ${pt.accent}`:"1px solid #e5e5e3",background:isActive?pt.accentBg:hasPick?"#f9f9f8":"#fff",width:"100%"}}>
            <i className={`ti ${pt.icon}`} style={{fontSize:15,color:isActive||hasPick?pt.accent:"#ccc",display:"block",marginBottom:3}}/>
            <div style={{fontSize:11,fontWeight:600,color:isActive?pt.accent:"#666"}}>{pt.label}</div>
            <div style={{fontSize:10,color:"#999",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",padding:"0 2px"}}>{hasPick?`${picks[pt.key].game.awayAbbr}@${picks[pt.key].game.homeAbbr}`:"Pick game"}</div>
          </button>;
        })}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"9px 12px",background:activePt.accentBg,borderRadius:10,border:`1px solid ${activePt.accent}33`}}>
        <i className={`ti ${activePt.icon}`} style={{fontSize:14,color:activePt.accent,flexShrink:0}}/>
        <span style={{fontSize:13,fontWeight:600,color:activePt.accent}}>{activePt.label}</span>
        <span style={{fontSize:12,color:"#666"}}>{activePt.desc}</span>
      </div>
      <div style={{display:"grid",gap:8,marginBottom:16}}>
        {games.map(g=>{
          const locked=usedGames.includes(g.id);
          const selected=picks[activeType]?.gameId===g.id;
          return<button className="game-card" key={g.id} onClick={()=>!locked&&selectPick(g)}
            style={{border:selected?`2px solid ${activePt.accent}`:"1px solid #e5e5e3",background:selected?activePt.accentBg:"#fff",opacity:locked?0.4:1,cursor:locked?"not-allowed":"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
              {selected&&<i className="ti ti-check" style={{fontSize:14,color:activePt.accent,flexShrink:0}}/>}
              <div style={{minWidth:0}}>
                <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap"}}>{g.awayAbbr} <span style={{color:"#ccc",fontWeight:400}}>@</span> {g.homeAbbr}</div>
                <div style={{fontSize:11,color:"#999",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:200}}>{g.away} @ {g.home}</div>
              </div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontSize:13,fontWeight:600,color:selected?activePt.accent:"#1a1a1a",whiteSpace:"nowrap"}}>{lineLabel(activeType,g)}</div>
              <div style={{fontSize:11,color:"#999",marginTop:1,whiteSpace:"nowrap"}}>{gameTime(g.commenceTime)}</div>
            </div>
          </button>;
        })}
      </div>
      <button onClick={savePicks} disabled={!allPicked||saving} style={{width:"100%",padding:"11px 0",fontSize:14,fontWeight:600,borderRadius:10,border:"none",background:allPicked?"#1a1a1a":"#e5e5e3",color:allPicked?"#fff":"#999",cursor:allPicked?"pointer":"not-allowed"}}>
        {saving?"Saving...":(allPicked?"Lock in picks":`${Object.values(picks).filter(Boolean).length} / 4 picks made`)}
      </button>
    </>}
  </div>;
}

/* ─── LEADERBOARD ─── */
function LeaderboardPage(){
  const[season,setSeason]=useState(2025);
  const[seasons,setSeasons]=useState([]);
  const[standings,setStandings]=useState([]);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.from("seasons").select("year").order("year",{ascending:false}).then(({data})=>setSeasons(data||[]));
  },[]);

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      const{data:seasonRow}=await sb.from("seasons").select("id").eq("year",season).single();
      if(!seasonRow){setStandings([]);setLoading(false);return;}
      const{data:picks}=await sb.from("picks").select("user_id,pick_type,result,profiles(username)").eq("season_id",seasonRow.id).neq("result","pending");
      if(!picks||picks.length===0){setStandings([]);setLoading(false);return;}
      const map={};
      picks.forEach(p=>{
        const name=p.profiles?.username||"Unknown";
        if(!map[name])map[name]={name,total:0,record:{over:[0,0,0],under:[0,0,0],favorite:[0,0,0],underdog:[0,0,0]}};
        const pts=pickScore(p.result);
        map[name].total=Math.round((map[name].total+pts)*10)/10;
        const r=map[name].record[p.pick_type];
        if(p.result==="win")r[0]++;else if(p.result==="push")r[1]++;else r[2]++;
      });
      setStandings(Object.values(map).sort((a,b)=>b.total-a.total));
      setLoading(false);
    })();
  },[season]);

  const medals=["🥇","🥈","🥉"];
  const fmt=([w,push,l])=>`${w}-${push>0?push+"-":""}${l}`;

  return<div style={{maxWidth:620,margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <div>
        <h2 style={{fontSize:17,fontWeight:600,margin:"0 0 2px"}}>Season standings</h2>
        <p style={{fontSize:13,color:"#666",margin:0}}>Pick'em Challenge</p>
      </div>
      <select value={season} onChange={e=>setSeason(+e.target.value)} style={{fontSize:13,padding:"5px 10px",borderRadius:8,border:"1px solid #ddd"}}>
        {seasons.map(s=><option key={s.year} value={s.year}>{s.year}</option>)}
      </select>
    </div>
    {loading?<Spinner/>:standings.length===0?<div style={{textAlign:"center",padding:"40px 0",color:"#999"}}>No results yet for {season}.</div>:<>
      <div className="lb-scroll">
        <div className="lb-table">
          <div style={{display:"grid",gridTemplateColumns:"28px 1fr 52px 52px 52px 52px 52px",padding:"10px 12px",borderBottom:"1px solid #e5e5e3",background:"#f9f9f8"}}>
            {["","Player","Over","Under","Fav","Dog","Pts"].map((h,i)=><span key={i} style={{fontSize:10,fontWeight:600,color:"#999",textAlign:i>1?"center":"left",letterSpacing:"0.04em",whiteSpace:"nowrap"}}>{h}</span>)}
          </div>
          {standings.map((p,idx)=><div key={p.name} style={{display:"grid",gridTemplateColumns:"28px 1fr 52px 52px 52px 52px 52px",padding:"10px 12px",borderBottom:idx<standings.length-1?"1px solid #e5e5e3":"none",alignItems:"center"}}>
            <span style={{fontSize:13}}>{medals[idx]||<span style={{fontSize:11,color:"#999",fontWeight:600}}>{idx+1}</span>}</span>
            <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0}}><Avatar name={p.name} size={24}/><span style={{fontSize:13,fontWeight:idx===0?600:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</span></div>
            {[p.record.over,p.record.under,p.record.favorite,p.record.underdog].map((r,i)=><span key={i} style={{fontSize:11,color:"#666",textAlign:"center",whiteSpace:"nowrap"}}>{fmt(r)}</span>)}
            <span style={{fontSize:13,fontWeight:600,textAlign:"center",color:idx===0?"#d97706":"#1a1a1a"}}>{p.total}</span>
          </div>)}
        </div>
      </div>
    </>}
  </div>;
}

/* ─── HISTORY ─── */
function HistoryPage({user}){
  const[weeks,setWeeks]=useState([]);
  const[loading,setLoading]=useState(true);
  const rs={win:{bg:"rgba(5,150,105,0.1)",border:"#059669",text:"#059669",label:"Win +1"},push:{bg:"rgba(217,119,6,0.1)",border:"#d97706",text:"#d97706",label:"Push +0.5"},loss:{bg:"rgba(220,38,38,0.1)",border:"#dc2626",text:"#dc2626",label:"Loss"},pending:{bg:"#f3f3f1",border:"#ccc",text:"#999",label:"Pending"}};

  useEffect(()=>{
    (async()=>{
      const{data}=await sb.from("picks").select("*,seasons(year)").eq("user_id",user.id).order("week",{ascending:false});
      if(!data){setLoading(false);return;}
      const grouped={};
      data.forEach(p=>{
        const k=`${p.seasons?.year}-${p.week}`;
        if(!grouped[k])grouped[k]={year:p.seasons?.year,week:p.week,picks:[]};
        grouped[k].picks.push(p);
      });
      setWeeks(Object.values(grouped).sort((a,b)=>b.year-a.year||b.week-a.week));
      setLoading(false);
    })();
  },[user.id]);

  if(loading)return<Spinner/>;

  const totalPts=weeks.reduce((a,w)=>a+w.picks.reduce((b,p)=>b+pickScore(p.result),0),0);

  return<div style={{maxWidth:560,margin:"0 auto"}}>
    <h2 style={{fontSize:17,fontWeight:600,margin:"0 0 3px"}}>My history</h2>
    <p style={{fontSize:13,color:"#666",margin:"0 0 16px"}}>All seasons</p>
    <div className="stat-grid">
      {[["Total pts",totalPts,"ti-chart-bar"],["Weeks",weeks.length,"ti-calendar"],["Best week",weeks.length?Math.max(...weeks.map(w=>w.picks.reduce((a,p)=>a+pickScore(p.result),0))):0,"ti-flame"],["Avg",weeks.length?(totalPts/weeks.length).toFixed(1):0,"ti-math-function"]].map(([label,val,icon])=><div key={label} style={{background:"#f3f3f1",borderRadius:10,padding:"11px 12px"}}>
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}><i className={`ti ${icon}`} style={{fontSize:12,color:"#999"}}/><span style={{fontSize:10,color:"#999",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.04em"}}>{label}</span></div>
        <div style={{fontSize:15,fontWeight:600}}>{val}</div>
      </div>)}
    </div>
    {weeks.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#999"}}>No picks yet. Make your first picks!</div>}
    {weeks.map(w=>{
      const pts=w.picks.reduce((a,p)=>a+pickScore(p.result),0);
      return<div key={`${w.year}-${w.week}`} style={{background:"#fff",border:"1px solid #e5e5e3",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
        <div style={{padding:"11px 14px",borderBottom:"1px solid #e5e5e3",background:"#f9f9f8",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:14,fontWeight:600}}>{w.year} · Week {w.week}</span>
          <span style={{fontSize:14,fontWeight:600,color:pts>=3?"#059669":pts<=1?"#dc2626":"#1a1a1a"}}>{pts} pts</span>
        </div>
        <div style={{padding:"12px 14px",display:"grid",gap:10}}>
          {w.picks.map(p=>{
            const pt=PICK_TYPES.find(t=>t.key===p.pick_type);
            const r=rs[p.result]||rs.pending;
            return<div key={p.id} className="pick-row">
              <div className="pick-row-left">
                <div style={{width:26,height:26,borderRadius:7,background:pt.accentBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><i className={`ti ${pt.icon}`} style={{fontSize:12,color:pt.accent}}/></div>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.away_team.split(" ").pop()} @ {p.home_team.split(" ").pop()}</div>
                  <div style={{fontSize:11,color:"#999"}}>{pt.label} · {pt.key==="over"?`O ${p.line}`:pt.key==="under"?`U ${p.line}`:p.line}</div>
                </div>
              </div>
              <span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:20,background:r.bg,color:r.text,border:`1px solid ${r.border}44`,flexShrink:0,whiteSpace:"nowrap"}}>{r.label}</span>
            </div>;
          })}
        </div>
      </div>;
    })}
  </div>;
}

/* ─── ALL-TIME STATS ─── */
function AllTimePage(){
  const[stats,setStats]=useState([]);
  const[loading,setLoading]=useState(true);
  const[view,setView]=useState("category");

  useEffect(()=>{
    (async()=>{
      const{data}=await sb.from("picks").select("user_id,pick_type,away_team,home_team,result,profiles(username)").neq("result","pending");
      if(!data){setLoading(false);return;}
      const map={};
      data.forEach(p=>{
        const name=p.profiles?.username||"Unknown";
        if(!map[name])map[name]={name,byCategory:{over:[0,0,0],under:[0,0,0],favorite:[0,0,0],underdog:[0,0,0]},byTeam:{}};
        const r=map[name].byCategory[p.pick_type];
        if(p.result==="win")r[0]++;else if(p.result==="push")r[1]++;else r[2]++;
        [p.away_team,p.home_team].forEach(team=>{
          const t=team.split(" ").pop();
          if(!map[name].byTeam[t])map[name].byTeam[t]=[0,0,0];
          const tr=map[name].byTeam[t];
          if(p.result==="win")tr[0]++;else if(p.result==="push")tr[1]++;else tr[2]++;
        });
      });
      setStats(Object.values(map));
      setLoading(false);
    })();
  },[]);

  const fmt=([w,push,l])=>`${w}-${push>0?push+"-":""}${l}`;
  const pct=([w,push,l])=>{const t=w+push+l;return t?Math.round((w+push*0.5)/t*100):0;};

  if(loading)return<Spinner/>;

  return<div style={{maxWidth:620,margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
      <div>
        <h2 style={{fontSize:17,fontWeight:600,margin:"0 0 2px"}}>All-time stats</h2>
        <p style={{fontSize:13,color:"#666",margin:0}}>Every pick ever made</p>
      </div>
      <div style={{display:"flex",background:"#f3f3f1",borderRadius:8,padding:3,gap:3}}>
        {[["category","By type"],["team","By team"]].map(([v,l])=><button key={v} onClick={()=>setView(v)} style={{padding:"5px 10px",border:"none",borderRadius:6,fontSize:12,fontWeight:500,background:view===v?"#fff":"transparent",color:view===v?"#1a1a1a":"#666"}}>{l}</button>)}
      </div>
    </div>

    {stats.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#999"}}>No completed picks yet.</div>}

    {stats.map(player=><div key={player.name} style={{background:"#fff",border:"1px solid #e5e5e3",borderRadius:12,marginBottom:12,overflow:"hidden"}}>
      <div style={{padding:"11px 14px",borderBottom:"1px solid #e5e5e3",background:"#f9f9f8",display:"flex",alignItems:"center",gap:8}}>
        <Avatar name={player.name} size={26}/><span style={{fontSize:14,fontWeight:600}}>{player.name}</span>
      </div>
      <div style={{padding:"12px 14px"}}>
        {view==="category"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {PICK_TYPES.map(pt=>{
            const r=player.byCategory[pt.key];const p=pct(r);
            return<div key={pt.key} style={{background:pt.accentBg,borderRadius:10,padding:"10px 12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                <i className={`ti ${pt.icon}`} style={{fontSize:13,color:pt.accent}}/>
                <span style={{fontSize:12,fontWeight:600,color:pt.accent}}>{pt.label}</span>
              </div>
              <div style={{fontSize:15,fontWeight:600}}>{fmt(r)}</div>
              <div style={{fontSize:11,color:"#666",marginTop:2}}>{p}% win rate</div>
            </div>;
          })}
        </div>}
        {view==="team"&&<div style={{display:"grid",gap:6}}>
          {Object.entries(player.byTeam).sort((a,b)=>(b[1][0]+b[1][1]+b[1][2])-(a[1][0]+a[1][1]+a[1][2])).slice(0,8).map(([team,r])=><div key={team} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"7px 10px",background:"#f9f9f8",borderRadius:8}}>
            <span style={{fontSize:13,fontWeight:600}}>{team}</span>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              <span style={{fontSize:12,color:"#666"}}>{fmt(r)}</span>
              <span style={{fontSize:12,fontWeight:600,color:pct(r)>=60?"#059669":pct(r)<=40?"#dc2626":"#1a1a1a"}}>{pct(r)}%</span>
            </div>
          </div>)}
        </div>}
      </div>
    </div>)}
  </div>;
}

/* ─── ADMIN ─── */
function AdminPage({games}){
  const[week,setWeek]=useState(1);
  const[allPicks,setAllPicks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[saving,setSaving]=useState(false);
  const[saved,setSaved]=useState(false);

  useEffect(()=>{
    (async()=>{
      setLoading(true);setSaved(false);
      const{data}=await sb.from("picks").select("*,profiles(username)").eq("week",week);
      setAllPicks(data||[]);setLoading(false);
    })();
  },[week]);

  const setResult=async(id,result)=>{
    setAllPicks(p=>p.map(pick=>pick.id===id?{...pick,result}:pick));
    setSaved(false);
  };

  const saveResults=async()=>{
    setSaving(true);
    await Promise.all(allPicks.map(p=>sb.from("picks").update({result:p.result}).eq("id",p.id)));
    setSaving(false);setSaved(true);
  };

  const grouped={};
  allPicks.forEach(p=>{const n=p.profiles?.username||"Unknown";if(!grouped[n])grouped[n]=[];grouped[n].push(p);});

  const btnStyle=(active,type)=>{const c={win:{bg:"rgba(5,150,105,0.15)",color:"#059669"},push:{bg:"rgba(217,119,6,0.15)",color:"#d97706"},loss:{bg:"rgba(220,38,38,0.15)",color:"#dc2626"}};return{padding:"4px 8px",borderRadius:16,border:`1px solid ${active?c[type].color+"66":"#e5e5e3"}`,cursor:"pointer",fontSize:11,fontWeight:600,background:active?c[type].bg:"#f9f9f8",color:active?c[type].color:"#666",whiteSpace:"nowrap"};};

  return<div style={{maxWidth:620,margin:"0 auto"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
      <h2 style={{fontSize:17,fontWeight:600,margin:0}}>Enter results</h2>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <select value={week} onChange={e=>setWeek(+e.target.value)} style={{fontSize:12,padding:"4px 8px",borderRadius:8,border:"1px solid #ddd"}}>
          {Array.from({length:18},(_,i)=><option key={i+1} value={i+1}>Week {i+1}</option>)}
        </select>
        <span style={{fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:20,background:"rgba(217,119,6,0.1)",color:"#d97706",border:"1px solid #d9770633",whiteSpace:"nowrap"}}>Admin</span>
      </div>
    </div>
    <p style={{fontSize:13,color:"#666",margin:"0 0 16px"}}>Mark each pick as win, push, or loss</p>
    {loading?<Spinner/>:Object.keys(grouped).length===0?<p style={{fontSize:13,color:"#666"}}>No picks submitted for Week {week} yet.</p>:<>
      <div style={{display:"grid",gap:10}}>
        {Object.entries(grouped).map(([name,picks])=><div key={name} style={{background:"#fff",border:"1px solid #e5e5e3",borderRadius:12,overflow:"hidden"}}>
          <div style={{padding:"11px 14px",borderBottom:"1px solid #e5e5e3",background:"#f9f9f8",display:"flex",alignItems:"center",gap:8}}><Avatar name={name} size={24}/><span style={{fontSize:14,fontWeight:600}}>{name}</span></div>
          <div style={{padding:"12px 14px",display:"grid",gap:10}}>
            {picks.map(p=>{
              const pt=PICK_TYPES.find(t=>t.key===p.pick_type);
              return<div key={p.id} className="result-row">
                <div className="result-info">
                  <i className={`ti ${pt.icon}`} style={{fontSize:13,color:pt.accent,flexShrink:0}}/>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap"}}>{p.away_team.split(" ").pop()} @ {p.home_team.split(" ").pop()}</div>
                    <div style={{fontSize:11,color:"#999"}}>{pt.label} · {pt.key==="over"?`O ${p.line}`:pt.key==="under"?`U ${p.line}`:p.line}</div>
                  </div>
                </div>
                <div className="result-btns">{["win","push","loss"].map(r=><button key={r} onClick={()=>setResult(p.id,r)} style={btnStyle(p.result===r,r)}>{r}</button>)}</div>
              </div>;
            })}
          </div>
        </div>)}
      </div>
      <button onClick={saveResults} disabled={saving} style={{marginTop:14,width:"100%",padding:"11px 0",fontSize:14,fontWeight:600,background:"#1a1a1a",color:"#fff",border:"none",borderRadius:10,cursor:"pointer"}}>
        {saving?"Saving...":saved?"✓ Saved!":"Save all results"}
      </button>
    </>}
  </div>;
}

/* ─── ODDS LOADER ─── */
function OddsLoader({children}){
  const[games,setGames]=useState([]);
  const[error,setError]=useState(null);
  const[loading,setLoading]=useState(true);
  const[lastUpdated,setLastUpdated]=useState(null);
  const fetchOdds=useCallback(async()=>{
    setLoading(true);setError(null);
    try{
      const res=await fetch(ODDS_PROXY);
      if(!res.ok)throw new Error(`Error ${res.status}`);
      const data=await res.json();
      if(!Array.isArray(data)||data.length===0){setGames([]);setError("No NFL games with lines right now.");}
      else{setGames(parseGames(data));}
      setLastUpdated(new Date());
    }catch(e){setError("Could not load odds: "+e.message);}
    finally{setLoading(false);}
  },[]);
  useEffect(()=>{fetchOdds();},[fetchOdds]);
  if(loading)return<Spinner label="Fetching live NFL lines..."/>;
  return children({games,error,fetchOdds,lastUpdated});
}

/* ─── APP ─── */
function App(){
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[page,setPage]=useState("picks");
  const[checkingAuth,setCheckingAuth]=useState(true);

  const loadProfile=async(uid)=>{
    const{data:p,error}=await sb.from("profiles").select("*").eq("id",uid).single();
    if(p)setProfile(p);
    return p;
  };

  useEffect(()=>{
    sb.auth.getSession().then(async({data:{session}})=>{
      if(session){setUser(session.user);await loadProfile(session.user.id);}
      setCheckingAuth(false);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(session){setUser(session.user);await loadProfile(session.user.id);}
      else{setUser(null);setProfile(null);}
    });
    return()=>subscription.unsubscribe();
  },[]);

  const signOut=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);setPage("picks");};

  if(checkingAuth)return<Spinner label="Loading..."/>;
  if(!user)return<AuthPage onAuth={(u,p)=>{setUser(u);setProfile(p);}}/>;

  return<OddsLoader>{({games,error,fetchOdds,lastUpdated})=>(
    <div style={{maxWidth:680,margin:"0 auto",padding:"16px 14px"}}>
      <div className="app-header">
        <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
          <i className="ti ti-ball-football" style={{fontSize:20,flexShrink:0}}/>
          <span style={{fontSize:16,fontWeight:600}}>Pick'em</span>
          <span style={{fontSize:11,color:"#999",background:"#f3f3f1",padding:"2px 7px",borderRadius:6,whiteSpace:"nowrap"}}>NFL 2026</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
          <Avatar name={profile?.username||"?"} size={26}/>
          <span style={{fontSize:13,color:"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:80}}>{profile?.username}</span>
          <button onClick={signOut} style={{fontSize:11,padding:"3px 7px",color:"#999",whiteSpace:"nowrap"}}>Sign out</button>
        </div>
      </div>
      <NavBar page={page} setPage={setPage} isAdmin={profile?.is_admin}/>
      {page==="picks"&&<PicksPage user={user} profile={profile} games={games} error={error} fetchOdds={fetchOdds} lastUpdated={lastUpdated}/>}
      {page==="leaderboard"&&<LeaderboardPage/>}
      {page==="history"&&<HistoryPage user={user}/>}
      {page==="alltime"&&<AllTimePage/>}
      {page==="admin"&&profile?.is_admin&&<AdminPage games={games}/>}
    </div>
  )}</OddsLoader>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
